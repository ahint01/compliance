name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # CRITICAL: Ensure this is 'us-east-2' based on your JSON
          aws-region: ${{ env.AWS_REGION }} 

      # 2. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build and Tag Docker Image
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 4. Manual Task Definition Update (FIXED CONTAINER NAME)
      - name: Fetch, Update Image, and Save Task Definition
        id: render-task-def
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.IMAGE_URI }}
        run: |
          TASK_DEF_FAMILY="compliance-checker-demo-task"
          CONTAINER_TO_UPDATE="compliance-checker-demo-django-container" 
          NEW_IMAGE_URI="${{ steps.build-image.outputs.IMAGE_URI }}"
          
          echo "--- 1. Fetching Task Definition: $TASK_DEF_FAMILY ---"
          
          if ! aws ecs describe-task-definition \
            --task-definition $TASK_DEF_FAMILY \
            --query taskDefinition > task-definition-raw.json; then
            echo "::error::AWS CLI failure in 'describe-task-definition'. Check IAM permissions."
            exit 1 
          fi
          
          if [ ! -s task-definition-raw.json ]; then
            echo "::error::Task definition file is empty after fetch. Check AWS logs for hidden errors."
            exit 1
          fi
          
          echo "--- 2. Cleaning and Injecting New Image URI: $NEW_IMAGE_URI into Container: $CONTAINER_TO_UPDATE ---"
          
          JQ_EXPRESSION="
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .deregisteredAt, .registeredBy)
            | .containerDefinitions |= map(
                if .name == \"${CONTAINER_TO_UPDATE}\" then 
                    .image = \"${NEW_IMAGE_URI}\" 
                else 
                    . 
                end
            )
          "
          
          cat task-definition-raw.json | jq "${JQ_EXPRESSION}" > task-definition.json
            
          echo "--- 3. Updated task-definition.json created and ready for deployment. ---"
          
      # 5. Deploy the updated Task Definition to the ECS Service
      - name: Deploy to Amazon ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}