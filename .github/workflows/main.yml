name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub UI

env:
  # Reference GitHub Secrets configured in the previous step
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to ECS
    runs-on: ubuntu-latest
    environment: production # Use a GitHub Environment for better tracking

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configure AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build and Tag Docker Image
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # Use the commit SHA as the unique tag
        run: |
          # Build using the Dockerfile in the root directory
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 4. Deploy to ECS
      - name: Render Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          # Use the 'family' name of your Task Definition on AWS
          # You can find this in your ec2_service.tf or the AWS console
          task-definition: compliance-task-definition
          # This name MUST match the 'name' attribute in your ec2_service.tf container definition
          container-name: compliance-checker-django-container
          # The ECR image URI output from step 3
          image: ${{ steps.build-image.outputs.IMAGE_URI }}
          # This creates a NEW local file named 'task-definition.json'
          output-task-definition: task-definition.json

      # 5. Deploy the updated Task Definition to the ECS Service
      - name: Deploy to Amazon ECS Service
        uses: aws-actions/amazon-ecs-deploy-service@v1
        with:
          # Reference the newly created local JSON file from the previous step
          task-definition: task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}